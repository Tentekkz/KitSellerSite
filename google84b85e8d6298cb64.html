
<style id="kitseller-white-premium">
:root{
  --ks-bg:#ffffff;
  --ks-soft:#f7f8fa;
  --ks-card:#ffffff;
  --ks-text:#111827;
  --ks-muted:#6b7280;
  --ks-line:#e5e7eb;
  --ks-accent:#0ea5a4;
  --ks-accent-dark:#0f766e;
  --ks-black:#0b0f14;
}
*{box-sizing:border-box}
html{background:var(--ks-bg)!important;scroll-behavior:smooth}
body{
  background:
    radial-gradient(circle at 20% 0%, rgba(14,165,164,.09), transparent 34%),
    radial-gradient(circle at 90% 8%, rgba(14,165,164,.06), transparent 26%),
    linear-gradient(180deg,#fff 0%,#f8fafc 100%)!important;
  color:var(--ks-text)!important;
}
body::before, body::after, .noise, .grain, .grid, .bg, .particles, .glow, .orb{opacity:.08!important}
a{color:inherit}
header, nav, .navbar, .nav, .topbar{
  background:rgba(255,255,255,.84)!important;
  backdrop-filter: blur(16px)!important;
  -webkit-backdrop-filter: blur(16px)!important;
  border-bottom:1px solid var(--ks-line)!important;
  box-shadow:0 8px 30px rgba(15,23,42,.04)!important;
}
.brand-logo{height:34px;width:auto;display:block}
.footer-logo{height:34px;width:auto;display:block}
.nlogo,.logo,.brand,.flogo{color:var(--ks-text)!important}
.nmark,.fmk{
  background:var(--ks-text)!important;
  color:#fff!important;
  border-radius:10px!important;
}
button,.btn,.button,.cta,a[class*="btn"],a[class*="cta"]{
  border-radius:14px!important;
  transition:all .22s ease!important;
}
.btn-primary,.primary,.cta-primary,a[href*="t.me"], .nav a[href*="t.me"], .navbar a[href*="t.me"]{
  background:var(--ks-black)!important;
  color:#fff!important;
  border:1px solid var(--ks-black)!important;
  box-shadow:0 12px 30px rgba(15,23,42,.12)!important;
}
.btn-primary:hover,.primary:hover,.cta-primary:hover,a[href*="t.me"]:hover{
  background:var(--ks-accent)!important;
  border-color:var(--ks-accent)!important;
  box-shadow:0 16px 36px rgba(14,165,164,.22)!important;
  transform:translateY(-1px);
}
.card,.feature,.pricing,.price,.faq-item,.product-card,.glass,.panel,section [class*="card"],section [class*="box"]{
  background:rgba(255,255,255,.86)!important;
  color:var(--ks-text)!important;
  border:1px solid var(--ks-line)!important;
  box-shadow:0 18px 55px rgba(15,23,42,.06)!important;
  border-radius:22px!important;
}
.card:hover,.feature:hover,.product-card:hover,.panel:hover{
  border-color:rgba(14,165,164,.32)!important;
  box-shadow:0 24px 70px rgba(15,23,42,.08)!important;
}
h1,h2,h3,h4,.title,.headline{color:var(--ks-text)!important}
p,li,.muted,.subtitle,.desc,.text-muted{color:var(--ks-muted)!important}
.badge,.tag,.label,[class*="badge"],[class*="tag"]{
  background:rgba(14,165,164,.08)!important;
  color:var(--ks-accent-dark)!important;
  border:1px solid rgba(14,165,164,.18)!important;
}
pre,code,.terminal,.code,.codebox,[class*="code"]{
  background:#0b0f14!important;
  color:#e5e7eb!important;
  border-color:rgba(255,255,255,.08)!important;
  box-shadow:0 22px 50px rgba(15,23,42,.18)!important;
}
input,textarea,select{
  background:#fff!important;
  color:var(--ks-text)!important;
  border:1px solid var(--ks-line)!important;
}
.accent,.active,[aria-current="page"]{color:var(--ks-accent)!important}
footer{
  background:#f8fafc!important;
  color:var(--ks-text)!important;
  border-top:1px solid var(--ks-line)!important;
}
::selection{background:rgba(14,165,164,.22)}
</style>
